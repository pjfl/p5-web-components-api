name = Web-Components-API

[Prereqs]
perl              = 5.010001
namespace::autoclean = 0.29
strictures        = 2.000006
Data::Validation  = v0.28.7
Exporter::Tiny    = 1.006000
File::DataClass   = v0.73.11
HTTP::Message     = 6.44
Moo               = 2.005005
MooX::HandlesVia  = 0.001009
Ref::Util         = 0.204
Sub::Install      = 0.929
Try::Tiny         = 0.31
Type::Tiny        = 2.002001
Unexpected        = v1.0.8
Web::Components   = v0.13.48
Web::ComposableRequest = v0.22.3

[Prereqs / ConfigureRequires]
version           = 0.88
Module::Build     = 0.4004

[Prereqs / BuildRequires]
version           = 0.88
Module::Build     = 0.4004

[Prereqs / TestRequires]
version           = 0.88
Module::Build     = 0.4004
Test::Requires    = 0.06
HTTP::Message     = 6.44
IO::String        = 1.08
JSON::MaybeXS     = 1.004004
Web::ComposableRequest = v0.22.3

[Meta::Dynamic::Config]

[MetaNoIndex]
directory         = examples
directory         = inc
directory         = share
directory         = t

[MetaProvides::Package]
inherit_version   = 0
meta_noindex      = 1

[MetaResources]
license           = http://dev.perl.org/licenses/
homepage          = https://metacpan.org/author/PJFL
bugtracker.web    = http://rt.cpan.org/NoAuth/Bugs.html?Dist=Web-Components-API
bugtracker.mailto = bug-Web-Components-API@rt.cpan.org
repository.url    = git://github.com/pjfl/p5-web-components-api.git
repository.web    = http://github.com/pjfl/p5-web-components-api
repository.type   = git

[ReadmeAnyFromPod / ReadmeMarkdownInRoot]
filename          = README.md
location          = root
type              = markdown

[Run::BeforeBuild]
run               = cp .build.PL Build.PL

[CopyFilesFromBuild]
copy              = Build.PL
move              = cpanfile

[GatherDir]
exclude_filename  = cpanfile

; So apparently order matters
[ReadmeAnyFromPod]
[Signature]
[AbstractFromPOD]
[LicenseFromModule]
[VersionFromModule]
[ModuleBuild::Custom]
[License]
[CPANFile]
[MetaConfig]
[MetaJSON]
[MetaYAML]
[ManifestInRoot]
[ManifestSkip]
[Test::ReportMetadata]

